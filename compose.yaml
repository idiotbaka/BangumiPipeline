services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8090:8090"
    environment:
      BP_COOKIE_SECURE: "false"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
